  <style>
    :root {
      --bg:#0a0e1a; --panel:#0d1424; --panel-2:#12192c;
      --border:rgba(255,255,255,0.08); --border-accent:rgba(201,169,97,0.3);
      --accent:#c9a961; --accent-hover:#d9b871;
      --text:#e6e8ee; --text-dim:#a8b0c0; --text-mute:#7a8290;
      --ok:#67c98a; --err:#e56a6a;
    }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; line-height: 1.6; -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 560px; margin: 0 auto; padding: 40px 24px 80px; }
    .nav { margin-bottom: 24px; }
    .nav a { color: var(--text-dim); text-decoration: none; font-size: 12px; letter-spacing: 0.08em; }
    .nav a:hover { color: var(--accent); }
    h1 { font-size: 30px; margin: 0 0 8px; letter-spacing: -0.02em; }
    .lede { color: var(--text-dim); font-size: 15px; margin: 0 0 28px; }
    .card {
      background: var(--panel); border: 1px solid var(--border-accent);
      border-radius: 12px; padding: 24px 22px;
    }
    label { display: block; font-size: 12px; color: var(--text-mute); letter-spacing: 0.06em; margin-bottom: 6px; }
    input[type="email"], input[type="text"] {
      width: 100%; padding: 12px 14px; background: var(--panel-2);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 15px; font-family: inherit;
      transition: border-color 0.15s;
    }
    input[type="email"]:focus, input[type="text"]:focus { outline: none; border-color: var(--accent); }
    .field { margin-bottom: 16px; }
    .btn {
      display: block; width: 100%;
      background: var(--accent); color: var(--bg);
      border: none; border-radius: 8px;
      padding: 13px 20px; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
      font-family: inherit;
    }
    .btn:hover { background: var(--accent-hover); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .fine { color: var(--text-mute); font-size: 12.5px; margin-top: 14px; line-height: 1.5; }
    .msg { margin-top: 14px; padding: 10px 14px; border-radius: 6px; font-size: 13.5px; display: none; }
    .msg.ok { display: block; color: var(--ok); background: rgba(103,201,138,0.08); border: 1px solid rgba(103,201,138,0.28); }
    .msg.err { display: block; color: var(--err); background: rgba(229,106,106,0.08); border: 1px solid rgba(229,106,106,0.28); }
    .lang { float: right; }
    .lang a { color: var(--text-mute); font-size: 11px; text-decoration: none; margin-left: 10px; }
    .lang a:hover { color: var(--accent); }
    footer { margin-top: 40px; text-align: center; color: var(--text-mute); font-size: 12px; }
    footer a { color: var(--text-mute); text-decoration: none; margin: 0 8px; }
    footer a:hover { color: var(--accent); }
  </style>

<body>
  <div class="wrap">
    <div class="nav">
      <a href="/ko/">&larr; r5tools.io</a>
      <span class="lang"><a href="/waitlist.html">English</a></span>
    </div>

    <h1>파운딩 대기자 명단</h1>
    <p class="lede">
      첫 100개 파운딩 얼라이언스 슬롯이 모두 채워졌습니다. 영구 평생 가격은 이제 마감되었습니다.
      슬롯이 다시 열리거나 다음 얼라이언스 스위트 출시 시 이메일로 알려드립니다.
    </p>

    <div class="card">
      <form id="waitlist-form" novalidate>
        <div class="field">
          <label for="email">이메일</label>
          <input id="email" type="email" name="email" required autocomplete="email" placeholder="you@yourdomain.com" />
        </div>
        <div class="field">
          <label for="discord">디스코드 아이디 <span style="color:var(--text-mute)">(선택)</span></label>
          <input id="discord" type="text" name="discord" autocomplete="off" placeholder="you#0000 또는 @you" />
        </div>
        <button class="btn" type="submit" id="submit-btn">대기자 등록</button>
        <div class="msg" id="msg"></div>
        <p class="fine">
          스팸 없음. 슬롯이 열리면 이메일 1통, 얼라이언스 스위트 출시 시 이메일 1통.
          언제든 한 번의 클릭으로 구독 취소 가능합니다.
        </p>
      </form>
    </div>

    <footer>
      <a href="/privacy.html">개인정보처리방침</a> &middot; <a href="/terms.html">이용약관</a> &middot; <a href="/ko/">홈</a>
    </footer>
  </div>

  <script>
    (function () {
      var API = 'https://access-codes.r5tools.io/api/drip/subscribe';
      if (/^(localhost|127\.0\.0\.1)/.test(location.hostname)) {
        API = location.protocol + '//' + location.hostname + ':8080/api/drip/subscribe';
      }
      var form = document.getElementById('waitlist-form');
      var msg = document.getElementById('msg');
      var btn = document.getElementById('submit-btn');
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        var email = document.getElementById('email').value.trim();
        var discord = document.getElementById('discord').value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          msg.className = 'msg err'; msg.textContent = '유효한 이메일 주소를 입력해주세요.'; return;
        }
        btn.disabled = true; btn.textContent = '전송 중…';
        msg.className = 'msg'; msg.textContent = '';
        fetch(API, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: email, lang: 'ko', tag: 'waitlist', discord: discord })
        }).then(function (r) {
          return r.json().then(function (b) { return { ok: r.ok, body: b }; });
        }).then(function (r) {
          if (r.ok) {
            msg.className = 'msg ok';
            msg.textContent = '등록되었습니다. 변경 사항이 생기면 즉시 이메일로 알려드립니다.';
            btn.textContent = '등록 완료 ✓'; form.reset();
            try { if (window.r5t && r5t.track) r5t.track('waitlist_signup', { tag: 'waitlist', lang: 'ko' }); } catch (e) {}
          } else {
            msg.className = 'msg err';
            msg.textContent = (r.body && r.body.error) === 'bad_email'
              ? '이메일 주소가 유효하지 않은 것 같습니다.'
              : '문제가 발생했습니다. 잠시 후 다시 시도해주세요.';
            btn.disabled = false; btn.textContent = '대기자 등록';
          }
        }).catch(function () {
          msg.className = 'msg err'; msg.textContent = '네트워크 오류. 다시 시도해주세요.';
          btn.disabled = false; btn.textContent = '대기자 등록';
        });
      });
    })();
  </script>
