# Trigger-based conversion nudges for r5tools.io.
#
# Complements the time-based drip (marketing/emails/send_drip.py) with
# BEHAVIOR-driven nudges — fire when a user's activity in
# LWS_Access_Codes/logs/activity.jsonl matches a pattern.
#
# EVALUATION MODEL
#   trigger_engine.py loads this file, walks every subscriber in
#   drip_subscribers.jsonl, and for each subscriber evaluates every
#   trigger's `condition` block against their 30-day event history
#   (aggregated from activity.jsonl + Plausible API if PLAUSIBLE_API_KEY
#   is set). All condition keys must match (AND semantics).
#
# CONDITION VOCABULARY (see trigger_engine._eval_condition)
#   tool_uses_last_Nd: '>=X'      Count of gate_check + tool_action events
#                                 (any tool) in the last N days.
#   tool_uses_last_Nd.<tool>:     Per-tool count (e.g. tool_uses_last_7d.hive).
#   tier: 'free' | 'paid'         Current subscriber tier from redemptions.jsonl.
#   days_since_signup: '>=X'      Days since drip_subscribers.jsonl.joined_at.
#   event_last_Nh: 'event_name'   User fired this event in the last N hours.
#   event_last_Nd: 'event_name'   Same, days window.
#   no_event_since: 'event_name'  User has NEVER fired this event
#                                 (or not since their most recent trigger match).
#   last_event_gt_hours.<name>:   Hours since user last fired <name>. Use to
#                                 delay nudge until intent has "cooled" — e.g.
#                                 wait 24h after pricing_page_view before nudging.
#   lang: 'ko' | 'en'             Subscriber's lang column.
#   country_in: [KR, JP, ...]     Country code allowlist.
#   global_signal.<key>: 'op X'   Cross-user signals resolved by the engine
#                                 (e.g. global_signal.founding_claimed: '>=80').
#
# ACTION BLOCK
#   template:        Basename in templates/ — engine adds -{lang}.md.
#   delay_hours:     After match, wait N hours before sending (lets the user
#                    finish what they're doing; also prevents nudging inside
#                    their active session).
#   max_per_user:    Lifetime cap for THIS trigger per subscriber.
#   cooldown_days:   Minimum days between two fires of THIS trigger for the
#                    same user (only relevant when max_per_user > 1).
#   channel:         'email' (default) | 'in_app' | 'both'.
#                    in_app matches are surfaced via in-app-nudge.js reading
#                    /api/nudge/pending on page load.
#
# GLOBAL RATE LIMITS (enforced by engine, not per-trigger)
#   - Max 1 nudge per user per 24h across ALL triggers.
#   - No sends during quiet hours (10 PM - 8 AM in user's local tz;
#     tz resolved from country_in or lang → Asia/Seoul for ko else UTC).
#   - Never send to a user whose drip status is "unsubscribed".

triggers:

  # ---------------------------------------------------------------
  # 1. HIGH USAGE, STILL FREE
  # User has clearly gotten value (5+ tool uses in the last week) and is
  # 3+ days past signup — the drip's "day 4 free-vs-30" pitch has already
  # landed. This is the softest, most-legit upgrade ask.
  # ---------------------------------------------------------------
  - id: high_usage_free
    condition:
      tool_uses_last_7d: '>=5'
      tier: 'free'
      days_since_signup: '>=3'
      no_event_since: 'unlock_success_paid'
    action:
      template: 'high-usage-upgrade'
      delay_hours: 2
      max_per_user: 1
      cooldown_days: 30
      channel: 'both'

  # ---------------------------------------------------------------
  # 2. PRICING PAGE VIEWED BUT DIDN'T CONVERT
  # Considered upgrading, walked away. Wait 24h so the nudge doesn't feel
  # creepy-fast, then send a soft follow-up addressing the top objection
  # from the day-4 drip stats (usually "is $30 really worth it if it's
  # only used a few times a season?").
  # ---------------------------------------------------------------
  - id: pricing_page_no_convert
    condition:
      event_last_7d: 'pricing_page_view'
      tier: 'free'
      last_event_gt_hours.pricing_page_view: '>=24'
      no_event_since: 'unlock_success_paid'
    action:
      template: 'pricing-nudge'
      delay_hours: 24
      max_per_user: 2
      cooldown_days: 14
      channel: 'email'

  # ---------------------------------------------------------------
  # 3. REFERRAL PAGE VIEWED BUT NO SHARE
  # User checked /refer.html but never copied their code / clicked the
  # share buttons. Nudge is "here's your code, one tap to share into
  # Discord/카톡". No conversion ask — the referral itself IS the
  # conversion (their share brings paid users).
  # ---------------------------------------------------------------
  - id: refer_page_view_no_share
    condition:
      event_last_7d: 'refer_page_view'
      no_event_since: 'refer_share_click'
      last_event_gt_hours.refer_page_view: '>=48'
    action:
      template: 'refer-share-nudge'
      delay_hours: 24
      max_per_user: 2
      cooldown_days: 21
      channel: 'both'

  # ---------------------------------------------------------------
  # 4. STRIPE CHECKOUT STARTED, ABANDONED
  # Highest-intent recovery signal we have. User clicked purchase, hit
  # Stripe, walked away without completing. Send within a few hours while
  # the intent is still warm.
  # ---------------------------------------------------------------
  - id: stripe_started_no_finish
    condition:
      event_last_24h: 'purchase_click'
      no_event_since: 'unlock_success_paid'
      last_event_gt_hours.purchase_click: '>=3'
    action:
      template: 'stripe-recover'
      delay_hours: 3
      max_per_user: 2
      cooldown_days: 7
      channel: 'email'

  # ---------------------------------------------------------------
  # 5. ACTIVE KR USER
  # Korean-language subscriber with 3+ sessions — high engagement,
  # cultural fit for the KR-specific pitch (Warzone 2007 is KR-heavy,
  # 카톡 sharing pattern, KR pricing framing). Only fires for ko lang.
  # ---------------------------------------------------------------
  - id: active_kr_user
    condition:
      lang: 'ko'
      tool_uses_last_7d: '>=3'
      tier: 'free'
      days_since_signup: '>=2'
      no_event_since: 'unlock_success_paid'
    action:
      template: 'active-kr-user'
      delay_hours: 6
      max_per_user: 1
      cooldown_days: 45
      channel: 'email'

  # ---------------------------------------------------------------
  # 6. FOUNDING TIER ALMOST GONE (GLOBAL BROADCAST)
  # When alliance-founding sold count crosses 80/100, broadcast urgency
  # nudge to ALL free subscribers with any tool activity in last 14d
  # (excludes graveyard signups who never returned). One-shot; the trigger
  # engine records `founding_broadcast_sent: true` in state.json to prevent
  # re-broadcast if the count temporarily dips.
  # ---------------------------------------------------------------
  - id: founding_almost_out
    condition:
      global_signal.founding_claimed: '>=80'
      tier: 'free'
      tool_uses_last_14d: '>=1'
    action:
      template: 'founding-almost-out'
      delay_hours: 0
      max_per_user: 1
      cooldown_days: 90
      channel: 'both'
