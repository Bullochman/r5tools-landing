# Screenshot targets for weekly capture run.
# Each entry:
#   url              (required)
#   name             (required, filename stem)
#   viewport         [width, height]   default [1440, 900]
#   wait_for_selector  CSS selector to wait for  default 'body'
#   wait_after_ms    extra settle delay (ms)     default 800
#   hover_selector   optional element to hover before shot
#   click_selector   optional element to click before shot
#   full_page        also capture full-page shot default true
#   viewport_only    skip the full-page shot     default false

