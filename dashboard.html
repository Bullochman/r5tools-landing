<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Tools Dashboard — R5TOOLS.IO</title>
  <meta name="description" content="Every r5tools.io Last War: Survival tool on one page — Landing Planner, Heat Simulator, Freeze Risk, Coal Burn, Hive Grid, Roster Extractor, and more. Open once, jump anywhere." />
  <meta name="robots" content="noindex,nofollow" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%230a0e1a'/%3E%3Ctext x='50' y='72' text-anchor='middle' font-family='system-ui,sans-serif' font-weight='700' font-size='60' fill='%23c9a961'%3ER5%3C/text%3E%3C/svg%3E" />
  <link rel="canonical" href="https://r5tools.io/dashboard.html" />

  <!-- Access-codes shared gate + roster-freshness widget -->
  <script src="https://access-codes.r5tools.io/lib.js" defer></script>
  <script src="https://roster.r5tools.io/static/roster-freshness.js" defer></script>
  <!-- Season strip widget (local same-origin) -->
  <script src="seasons-lib.js" defer></script>

  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #0a0e1a;
      --panel: #0d1424;
      --panel-2: #12192c;
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(201,169,97,0.30);
      --accent: #c9a961;
      --accent-hover: #d9b871;
      --text: #e6e8ee;
      --text-dim: #a8b0c0;
      --text-mute: #7a8290;
      --success: #8ae0a3;
      --warn: #e88a4a;
      --error: #ff5555;
    }
    html, body {
      margin: 0; padding: 0; background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased; line-height: 1.5;
    }
    code, .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

    .wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 48px; }

    header.top {
      display: flex; justify-content: space-between; align-items: center;
      gap: 16px; padding: 4px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .brand { font-size: 12.5px; letter-spacing: 0.16em; color: var(--accent); font-weight: 700; text-decoration: none; }
    .brand:hover { color: var(--accent-hover); }
    .brand .sep { color: var(--text-mute); margin: 0 8px; font-weight: 400; }
    .top-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    #roster-freshness-slot { min-height: 22px; }

    h1 { margin: 4px 0 4px; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    .subtitle { color: var(--text-dim); font-size: 13.5px; margin-bottom: 18px; }
    .subtitle a { color: var(--accent); text-decoration: none; }
    .subtitle a:hover { color: var(--accent-hover); text-decoration: underline; }

    .strip {
      background: var(--panel); border: 1px solid var(--border-accent);
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
      display: flex; gap: 20px; flex-wrap: wrap; align-items: center;
      font-size: 13px; color: var(--text-dim);
    }
    .strip .pill {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,169,97,0.10); color: var(--accent);
      padding: 3px 10px; border-radius: 100px; font-size: 11.5px; font-weight: 600;
      font-family: ui-monospace, monospace; letter-spacing: 0.04em;
    }
    .strip .strip-label { color: var(--text-mute); font-size: 11px; letter-spacing: 0.10em; text-transform: uppercase; }

    /* Tool grid */
    .grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px; margin-bottom: 24px;
    }
    .card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px 16px 14px; display: flex; flex-direction: column; gap: 8px; transition: border-color .15s, transform .15s; }
    .card:hover { border-color: var(--border-accent); transform: translateY(-1px); }
    .card .row1 { display: flex; align-items: center; gap: 10px; }
    .card .icon { width: 34px; height: 34px; border-radius: 8px; background: rgba(201,169,97,0.12); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .card .name { font-size: 14.5px; font-weight: 700; color: var(--text); line-height: 1.2; }
    .card .name-kr { display: block; color: var(--text-mute); font-size: 11.5px; font-weight: 500; margin-top: 2px; letter-spacing: 0.02em; }
    .card .hint { font-size: 12.5px; color: var(--text-dim); line-height: 1.45; min-height: 36px; }
    .card .foot { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.04); }
    .health {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-mute); font-family: ui-monospace, monospace;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-mute); }
    .dot.ok  { background: var(--success); box-shadow: 0 0 6px rgba(138,224,163,0.6); }
    .dot.err { background: var(--error); box-shadow: 0 0 6px rgba(255,85,85,0.5); }
    .open-btn {
      background: var(--accent); color: #0a0e1a; text-decoration: none;
      border-radius: 6px; padding: 6px 12px; font-weight: 700; font-size: 12.5px;
      transition: background .15s;
    }
    .open-btn:hover { background: var(--accent-hover); }

    /* Activity panel */
    .activity {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px 18px;
    }
    .activity h2 {
      font-size: 13px; font-weight: 600; margin: 0 0 12px; color: var(--text);
      display: flex; justify-content: space-between; align-items: center;
    }
    .activity h2 .hint { font-size: 11px; color: var(--text-mute); font-weight: 400; }
    .activity ul { list-style: none; padding: 0; margin: 0; font-size: 13px; }
    .activity li {
      display: flex; gap: 12px; padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .activity li:last-child { border-bottom: none; }
    .activity .when { color: var(--text-mute); font-family: ui-monospace, monospace; font-size: 11.5px; min-width: 90px; flex-shrink: 0; }
    .activity .msg { color: var(--text-dim); flex: 1; }
    .activity .msg b { color: var(--text); font-weight: 600; }
    .activity .empty { color: var(--text-mute); font-style: italic; padding: 8px 0; }

    footer { text-align: center; padding: 24px 0 8px; color: var(--text-mute); font-size: 11.5px; }
    footer a { color: var(--accent); text-decoration: none; }

    #signin-line { font-size: 12.5px; color: var(--text-dim); }
    #signin-line b { color: var(--text); }
    #signin-line a { color: var(--accent); text-decoration: none; }
    #signin-line a:hover { text-decoration: underline; }

    @media (max-width: 600px) {
      .wrap { padding: 16px 12px 32px; }
      header.top { padding-bottom: 14px; margin-bottom: 14px; }
      .grid { gap: 10px; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="main-app" class="wrap">

    <header class="top">
      <a href="/" class="brand">R5TOOLS.IO<span class="sep">·</span>DASHBOARD</a>
      <div class="top-right">
        <div id="roster-freshness-slot"></div>
      </div>
    </header>

    <h1 data-i18n="title">Your tools · 하나의 페이지</h1>
    <p class="subtitle" id="signin-line">
      <span data-i18n="loading">Checking your roster…</span>
    </p>

    <!-- Season / warzone strip -->
    <div class="strip" id="season-strip">
      <span class="strip-label" data-i18n="stripLabel">CONTEXT</span>
      <span class="pill" id="strip-warzone">Warzone: …</span>
      <span class="pill" id="strip-season">Season: …</span>
      <span class="pill" id="strip-week">Week: …</span>
      <span class="pill" id="strip-countdown">…</span>
    </div>

    <!-- Tool grid -->
    <section class="grid" id="tool-grid"><!-- populated by JS --></section>

    <!-- Recent activity -->
    <div class="activity">
      <h2>
        <span data-i18n="activityTitle">Recent activity · 최근 활동</span>
        <span class="hint" id="activity-hint" data-i18n="activityHintV1">v1 placeholder — live feed in v1.1</span>
      </h2>
      <ul id="activity-list"></ul>
    </div>

    <footer>
      <span data-i18n="footer">Signed unlock lives in a cookie on this browser · </span>
      <a href="/">r5tools.io home</a> ·
      <a href="https://access-codes.r5tools.io/">Manage unlock</a>
    </footer>

  </div>

<script>
(function () {
  "use strict";

  // ---------- i18n ----------
  var LANG = (navigator.language || "en").toLowerCase().startsWith("ko") ? "ko" : "en";
  var STR = {
    en: {
      title: "Your tools — one page",
      loading: "Checking your roster…",
      signedNoRoster: 'Signed in — no roster on file yet. <a href="https://roster.r5tools.io/" target="_blank" rel="noopener">Upload one →</a>',
      signedR5of: 'Signed in as R5 of <b>{name}</b>',
      signedR4of: 'Signed in as R4 of <b>{name}</b>',
      signedMember: 'Signed in — member of <b>{name}</b>',
      anonHint: 'Unlock a code to see your alliance context here.',
      stripLabel: "CONTEXT",
      activityTitle: "Recent activity",
      activityHintV1: "v1 placeholder — dynamic feed in v1.1",
      countdownLive: "S2 live · Wk {w}",
      countdownPre: "S2 launches in {d}d {h}h",
      countdownPast: "S2 complete",
      footer: "Signed unlock lives in a cookie on this browser · ",
      openBtn: "Open →",
      healthUp: "up",
      healthDown: "down",
      healthUnknown: "?",
      demoActivity: [
        { when: "2h ago", msg: "<b>Roster</b> uploaded — 94 members" },
        { when: "5h ago", msg: "<b>Landing Planner</b> · 47 tiles assigned" },
        { when: "1d ago", msg: "<b>Coal Burn Calc</b> · budget saved" },
        { when: "2d ago", msg: "<b>Heat Simulator</b> · L20 coverage exported" }
      ]
    },
    ko: {
      title: "내 도구 — 한 페이지에",
      loading: "명단 확인 중…",
      signedNoRoster: '로그인됨 — 명단 미등록. <a href="https://roster.r5tools.io/" target="_blank" rel="noopener">업로드 →</a>',
      signedR5of: '<b>{name}</b>의 R5로 로그인됨',
      signedR4of: '<b>{name}</b>의 R4로 로그인됨',
      signedMember: '<b>{name}</b>의 멤버로 로그인됨',
      anonHint: '코드를 입력하면 여기에 연맹 정보가 표시됩니다.',
      stripLabel: "컨텍스트",
      activityTitle: "최근 활동",
      activityHintV1: "v1 임시 데이터 — v1.1에서 실시간 피드",
      countdownLive: "S2 진행 · {w}주차",
      countdownPre: "S2 시작까지 {d}일 {h}시간",
      countdownPast: "S2 종료",
      footer: "잠금 해제는 이 브라우저 쿠키에 저장됩니다 · ",
      openBtn: "열기 →",
      healthUp: "정상",
      healthDown: "다운",
      healthUnknown: "?",
      demoActivity: [
        { when: "2시간 전", msg: "<b>명단</b> 업로드 완료 — 94명" },
        { when: "5시간 전", msg: "<b>착륙 플래너</b> · 타일 47개 배정" },
        { when: "1일 전", msg: "<b>석탄 계산기</b> · 예산 저장" },
        { when: "2일 전", msg: "<b>히트 시뮬레이터</b> · L20 커버리지" }
      ]
    }
  };
  function t(key) { return STR[LANG][key] || STR.en[key] || key; }

  // Apply data-i18n to any static tag
  document.querySelectorAll("[data-i18n]").forEach(function (el) {
    var v = t(el.getAttribute("data-i18n"));
    if (v) el.textContent = v;
  });

  // ---------- Tool catalog ----------
  var TOOLS = [
    { key: "roster",        icon: "🎬", name: "Roster Extractor",       nameKr: "명단 추출기",     hint: "Video → CSV in 2 minutes.",                     url: "https://roster.r5tools.io/" },
    { key: "alliance-list", icon: "📋", name: "Alliance List OCR",      nameKr: "연맹 목록 OCR",   hint: "Screenshot list → structured roster.",           url: "https://roster.r5tools.io/alliance-list" },
    { key: "landing",       icon: "🎯", name: "Landing Planner",        nameKr: "착륙 플래너",     hint: "Season 2 tile assignments by rank + power.",     url: "https://bullochman.github.io/lws-landing-planner-static/" },
    { key: "heat",          icon: "🔥", name: "Heat Simulator",         nameKr: "히트 시뮬레이터", hint: "Furnace / temperature coverage overlay.",         url: "https://bullochman.github.io/lws-heat-simulator-static/" },
    { key: "freeze",        icon: "❄️", name: "Freeze Risk Dashboard",  nameKr: "동결 위험판",     hint: "Week-1 freeze predictions per member.",           url: "https://bullochman.github.io/lws-freeze-risk-static/" },
    { key: "coal",          icon: "⛏️", name: "Coal Burn Calculator",   nameKr: "석탄 계산기",     hint: "Coal budget for Week-4 blizzard.",                url: "https://bullochman.github.io/lws-coal-burn-static/" },
    { key: "city",          icon: "🏙️", name: "City Capture Planner",   nameKr: "도시 점령 플래너", hint: "Assign city captures by power tier.",            url: "https://bullochman.github.io/lws-city-capture-static/" },
    { key: "season",        icon: "🗓️", name: "Season Timeline",        nameKr: "시즌 타임라인",   hint: "56-day Polar Storm event calendar.",              url: "https://bullochman.github.io/lws-season-timeline-static/" },
    { key: "hive",          icon: "🐝", name: "Hive Grid Manager",      nameKr: "하이브 관리자",   hint: "MG 3×3 / Stronghold / Megahive formations.",      url: "https://hive.r5tools.io/" },
    { key: "vs",            icon: "⚔️", name: "VS Days Optimizer",       nameKr: "VS 데이 최적화",  hint: "6-day phase-stack scoring playbook.",              url: "https://bullochman.github.io/lws-vs-days-static/" },
    { key: "profile",       icon: "👤", name: "Profile Studio",         nameKr: "프로필 스튜디오", hint: "Build + share your R5/officer profile.",           url: "https://bullochman.github.io/lws-profile-studio-static/" },
    { key: "coord",         icon: "📞", name: "Coordination Directory", nameKr: "협력 디렉토리",   hint: "R5-to-R5 opt-in ping directory.",                  url: "https://access-codes.r5tools.io/coordinate" },
    { key: "flag",          icon: "🚩", name: "Alliance Flag",          nameKr: "연맹 깃발",       hint: "400×400 alliance emblem PNG generator.",           url: "/alliance-flag.html", sameOrigin: true }
  ];

  // ---------- Render grid ----------
  var grid = document.getElementById("tool-grid");
  grid.innerHTML = TOOLS.map(function (tool) {
    return '<div class="card" data-tool="' + tool.key + '">' +
      '<div class="row1">' +
        '<div class="icon">' + tool.icon + '</div>' +
        '<div><div class="name">' + tool.name + '<span class="name-kr">' + tool.nameKr + '</span></div></div>' +
      '</div>' +
      '<div class="hint">' + tool.hint + '</div>' +
      '<div class="foot">' +
        '<span class="health" data-health="' + tool.key + '">' +
          '<span class="dot"></span><span class="status">' + t("healthUnknown") + '</span>' +
        '</span>' +
        '<a class="open-btn" href="' + tool.url + '"' + (tool.sameOrigin ? '' : ' target="_blank" rel="noopener"') + '>' + t("openBtn") + '</a>' +
      '</div>' +
    '</div>';
  }).join("");

  // ---------- Health checks (best-effort, no-cors) ----------
  TOOLS.forEach(function (tool) {
    if (tool.sameOrigin) {
      setHealth(tool.key, true, 0);
      return;
    }
    var url = tool.url + (tool.url.indexOf("?") === -1 ? "?_ping=" : "&_ping=") + Date.now();
    var t0 = performance.now();
    fetch(url, { mode: "no-cors", credentials: "omit", cache: "no-store" })
      .then(function () { setHealth(tool.key, true, performance.now() - t0); })
      .catch(function () { setHealth(tool.key, false, performance.now() - t0); });
  });
  function setHealth(key, up, ms) {
    var el = document.querySelector('[data-health="' + key + '"]');
    if (!el) return;
    var dot = el.querySelector(".dot"); var status = el.querySelector(".status");
    dot.classList.remove("ok", "err");
    dot.classList.add(up ? "ok" : "err");
    status.textContent = up ? (t("healthUp") + " · " + Math.round(ms) + "ms") : t("healthDown");
  }

  // ---------- Sign-in line + roster lookup ----------
  function escapeHtml(s) { return String(s).replace(/[&<>"']/g, function (c) { return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
  function renderSignin(html) { document.getElementById("signin-line").innerHTML = html; }
  var sigMatch = document.cookie.match(/(?:^|;\s*)lws_sig=([a-f0-9]{4,32})/i);
  var sig = sigMatch ? sigMatch[1] : null;
  if (!sig) {
    renderSignin(t("anonHint"));
  } else {
    fetch("https://roster.r5tools.io/api/live-roster?sig=" + encodeURIComponent(sig), { credentials: "omit" })
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (data) {
        if (!data || !data.exists || !(data.members || []).length) { renderSignin(t("signedNoRoster")); return; }
        var name = data.alliance_name || data.alliance_tag || ("Alliance " + sig.slice(0,4).toUpperCase());
        var me = (data.members || []).find(function (m) { return m.is_me || m.self; });
        var key = "signedMember";
        if (me && me.rank) {
          var r = String(me.rank).toUpperCase();
          if (r === "R5") key = "signedR5of";
          else if (r === "R4") key = "signedR4of";
        }
        renderSignin(t(key).replace("{name}", escapeHtml(name)));
      })
      .catch(function () { renderSignin(t("signedNoRoster")); });
  }

  // ---------- Season strip (falls back to hardcoded S2 launch if lib absent) ----------
  var S2_LAUNCH_UTC = Date.UTC(2026, 6, 26), SEASON_LEN_MS = 56 * 86400000;
  function paintStrip(ctx) {
    var warzone = (ctx && ctx.warzone_id) || "2007";
    var season = (ctx && ctx.season && ctx.season.name) || "Polar Storm";
    var week = (ctx && typeof ctx.week === "number") ? ctx.week : 0;
    var now = Date.now(), countdown;
    if (now < S2_LAUNCH_UTC) {
      var ms = S2_LAUNCH_UTC - now;
      countdown = t("countdownPre").replace("{d}", Math.floor(ms/86400000)).replace("{h}", Math.floor((ms%86400000)/3600000));
      week = 0;
    } else if (now < S2_LAUNCH_UTC + SEASON_LEN_MS) {
      week = Math.floor((now - S2_LAUNCH_UTC) / (7 * 86400000)) + 1;
      countdown = t("countdownLive").replace("{w}", week);
    } else { countdown = t("countdownPast"); }
    document.getElementById("strip-warzone").textContent = "Warzone: " + warzone;
    document.getElementById("strip-season").textContent  = "Season: " + season;
    document.getElementById("strip-week").textContent    = "Week: " + (week || "pre");
    document.getElementById("strip-countdown").textContent = countdown;
  }
  function tryStrip() {
    if (window.LWSSeasons && window.LWSSeasons.resolve) {
      window.LWSSeasons.resolve().then(paintStrip).catch(function () { paintStrip(null); });
    } else { paintStrip(null); }
  }
  window.addEventListener("DOMContentLoaded", function () { setTimeout(tryStrip, 250); });
  window.addEventListener("lws:warzone-changed", tryStrip);
  window.addEventListener("lws:season-changed", tryStrip);

  // ---------- Activity feed (v1 placeholder → try /api/activity if it exists) ----------
  function renderActivity(items) {
    var ul = document.getElementById("activity-list");
    if (!items || !items.length) {
      ul.innerHTML = '<li class="empty">' + (LANG === "ko" ? "활동이 아직 없습니다" : "no recent activity") + '</li>';
      return;
    }
    ul.innerHTML = items.slice(0, 5).map(function (row) {
      return '<li><span class="when">' + escapeHtml(row.when) + '</span><span class="msg">' + row.msg + '</span></li>';
    }).join("");
  }
  fetch("https://access-codes.r5tools.io/api/activity", { credentials: "include", cache: "no-store" })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (data) {
      if (data && Array.isArray(data.events) && data.events.length) {
        document.getElementById("activity-hint").textContent = LANG === "ko" ? "실시간" : "live";
        renderActivity(data.events.map(function (e) {
          return { when: e.when || e.ts || "", msg: escapeHtml(e.tool || "event") + " · " + escapeHtml(e.msg || e.event || "") };
        }));
      } else {
        renderActivity(t("demoActivity"));
      }
    })
    .catch(function () { renderActivity(t("demoActivity")); });

  // ---------- Access-codes gate: wrap #main-app if no valid unlock cookie ----------
  function tryGate() {
    if (window.LWSAccessCodes && window.LWSAccessCodes.gate) {
      try { window.LWSAccessCodes.gate("main-app"); } catch (e) {}
    } else { setTimeout(tryGate, 150); }
  }
  window.addEventListener("load", tryGate);
})();
</script>
</body>
</html>
